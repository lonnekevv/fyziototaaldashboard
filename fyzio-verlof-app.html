// ============================================================
// Opslag: gedeelde Supabase-tabel. Alle teamleden zien dezelfde
// gegevens, ongeacht apparaat of browser.
// ============================================================
if (!window.storage) {
  const SUPABASE_URL = "https://szunargvsmtzbbnmnghc.supabase.co";
  const SUPABASE_KEY = "sb_publishable_EiIt1zJuqgjj-2FJ4mXTlg__kmUrPu5";
  const TABLE = "fyzio_verlof";
  const headers = {
    apikey: SUPABASE_KEY,
    Authorization: "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json",
  };
  window.storage = {
    async get(key, shared) {
      const res = await fetch(
        SUPABASE_URL + "/rest/v1/" + TABLE + "?id=eq." + encodeURIComponent(key) + "&select=data",
        { headers }
      );
      if (!res.ok) throw new Error("Supabase fout bij ophalen (" + res.status + ")");
      const rows = await res.json();
      if (!rows.length) throw new Error("Key not found: " + key);
      return { key, value: JSON.stringify(rows[0].data), shared: !!shared };
    },
    async set(key, value, shared) {
      const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE, {
        method: "POST",
        headers: Object.assign({}, headers, { Prefer: "resolution=merge-duplicates" }),
        body: JSON.stringify({ id: key, data: JSON.parse(value), updated_at: new Date().toISOString() }),
      });
      if (!res.ok) throw new Error("Supabase fout bij opslaan (" + res.status + ")");
      return { key, value, shared: !!shared };
    },
    async delete(key, shared) {
      const res = await fetch(
        SUPABASE_URL + "/rest/v1/" + TABLE + "?id=eq." + encodeURIComponent(key),
        { method: "DELETE", headers }
      );
      if (!res.ok) throw new Error("Supabase fout bij verwijderen (" + res.status + ")");
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE + "?select=id", { headers });
      if (!res.ok) throw new Error("Supabase fout bij lijst ophalen (" + res.status + ")");
      const rows = await res.json();
      const keys = rows.map((r) => r.id).filter((k) => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: !!shared };
    },
  };
}
</script>

<script>

// ------------------------------------------------------------

var DAY_KEYS = ["mon", "tue", "wed", "thu", "fri"];
var DAY_LABELS = { mon: "Maandag", tue: "Dinsdag", wed: "Woensdag", thu: "Donderdag", fri: "Vrijdag" };
var WEEKDAY_TO_KEY = { 1: "mon", 2: "tue", 3: "wed", 4: "thu", 5: "fri" };

function todayISO() { var d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }

function parseNum(str) {
  if (str === null || str === undefined) return 0;
  var n = parseFloat(String(str).replace(",", "."));
  return isNaN(n) ? 0 : n;
}

  // 0.5 -> "0,5", 1 -> "1", 1.5 -> "1,5"
  var rounded = Math.round(n * 100) / 100;
  return String(rounded).replace(".", ",");
}

}

function weekdayKeyFromISO(iso) {
  var d = new Date(iso + "T00:00:00");
  return WEEKDAY_TO_KEY[d.getDay()] || null; // null = weekend
}

function timeToMin(t) {
  if (!t) return null;
  var parts = t.split(":");
  return Number(parts[0]) * 60 + Number(parts[1]);
}

// Kern van de automatische verlofberekening: elke werkdag bestaat uit
// maximaal 3 dagdelen (ochtend tot 12:30, middag 12:30-18:00, avond vanaf
// 18:00). Elk dagdeel waar het rooster in valt, telt als een halve dag.
function dayCost(shift) {
  if (!shift || !shift.start || !shift.end) return 0;
  var s = timeToMin(shift.start), e = timeToMin(shift.end);
  if (e <= s) return 0;
  var windows = [[0, 750], [750, 1080], [1080, 1440]]; // 12:30 en 18:00 grenzen
  var halves = 0;
  for (var i = 0; i < windows.length; i++) {
    var overlap = Math.min(e, windows[i][1]) - Math.max(s, windows[i][0]);
    if (overlap > 0) halves++;
  }
  return halves * 0.5;
}

// Pauzes tellen niet mee als werktijd bij het berekenen van de uren.
var BREAKS = [[605, 620], [745, 780], [905, 920]]; // 10:05-10:20, 12:25-13:00, 15:05-15:20

// Netto gewerkte uren voor één dienst, met pauzes die binnen die dienst
// vallen eraf getrokken. Afgerond op één decimaal.
function shiftWorkedHours(shift) {
  if (!shift || !shift.start || !shift.end) return 0;
  var s = timeToMin(shift.start), e = timeToMin(shift.end);
  if (e <= s) return 0;
  var minutes = e - s;
  for (var i = 0; i < BREAKS.length; i++) {
    var overlap = Math.min(e, BREAKS[i][1]) - Math.max(s, BREAKS[i][0]);
    if (overlap > 0) minutes -= overlap;
  }
  return Math.round((minutes / 60) * 10) / 10;
}

function eachDateISO(startISO, endISO) {
  var out = [];
  var d = new Date(startISO + "T00:00:00");
  var end = new Date(endISO + "T00:00:00");
  while (d <= end) {
    out.push(d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()));
    d.setDate(d.getDate() + 1);
  }
  return out;
}

  "jan willem": { mon: { start: "07:35", end: "16:35" }, tue: { start: "06:30", end: "16:35" }, wed: { start: "13:00", end: "21:00" }, thu: { start: "13:00", end: "17:50" }, fri: { start: "07:35", end: "15:05" } },
  "mayke": { mon: { start: "13:00", end: "21:00" }, tue: { start: "07:35", end: "17:25" }, wed: { start: "07:35", end: "17:00" }, thu: null, fri: { start: "07:35", end: "17:00" } },
  "laura": { mon: { start: "07:35", end: "17:25" }, tue: { start: "13:00", end: "21:00" }, wed: null, thu: { start: "07:35", end: "17:25" }, fri: { start: "07:35", end: "17:00" } },
  "nikita": { mon: { start: "07:35", end: "17:25" }, tue: { start: "13:00", end: "21:00" }, wed: null, thu: { start: "07:35", end: "17:25" }, fri: null },

  "thomas": { mon: null, tue: { start: "07:35", end: "17:25" }, wed: { start: "07:35", end: "17:00" }, thu: { start: "13:00", end: "21:00" }, fri: { start: "08:00", end: "17:00" } },

  "ellen": { mon: { start: "08:00", end: "17:25" }, tue: { start: "08:00", end: "17:25" }, wed: { start: "08:00", end: "12:25" }, thu: { start: "08:00", end: "12:25" }, fri: { start: "08:00", end: "12:25" } }
};
function knownScheduleFor(name) {
  var key = (name || "").trim().toLowerCase();
  return KNOWN_SCHEDULES[key] ? JSON.parse(JSON.stringify(KNOWN_SCHEDULES[key])) : null;
}
function schedulesEqual(a, b) {
  return JSON.stringify(a) === JSON.stringify(b);
}
function isUntouchedDefault(schedule) {
  // Ontbrekend rooster (oude data) telt ook als "nog nooit aangepast".
  return !schedule || schedulesEqual(schedule, defaultSchedule());
}

function defaultSchedule() {
  return {
    mon: { start: "07:35", end: "17:25" },
    tue: { start: "07:35", end: "17:25" },
    wed: { start: "07:35", end: "17:25" },
    thu: { start: "07:35", end: "17:25" },
    fri: { start: "07:35", end: "17:00" },
  };
}

// Berekent hoeveel verlofdagen (in halven) én hoeveel netto uren een periode
// kost voor een medewerker, o.b.v. diens eigen rooster (incl. pauzeaftrek).
// Weekend en "vrije" dagen tellen niet mee (die kosten toch al geen verlof).
function computeLeaveCost(schedule, startISO, endISO) {
  if (!startISO || !endISO) return { days: 0, hours: 0, breakdown: [] };
  var sched = schedule || defaultSchedule();
  var dates = eachDateISO(startISO, endISO);
  var totalDays = 0, totalHours = 0;
  var breakdown = [];
  for (var i = 0; i < dates.length; i++) {
    var iso = dates[i];
    var key = weekdayKeyFromISO(iso);
    var shift = key ? sched[key] : null;
    var cost = dayCost(shift);
    var hrs = shiftWorkedHours(shift);
    totalDays += cost;
    totalHours += hrs;
    breakdown.push({ iso: iso, key: key, shift: shift, cost: cost, hours: hrs });
  }
  return { days: Math.round(totalDays * 2) / 2, hours: Math.round(totalHours * 10) / 10, breakdown: breakdown };
}

// ------------------------------------------------------------
// Saldo helpers
// ------------------------------------------------------------
// Contractueel uitgangspunt: bij een voltijds dienstverband van 40 uur/week
// heeft iemand recht op 23 vakantiedagen (excl. feestdagen), oftewel 184 uur
// per jaar (23 x 8 uur). Dit rekenen we naar rato door op basis van iemands
// eigen netto weekuren (rooster minus pauzes).
var FULLTIME_WEEKHOURS = 40;
var FULLTIME_LEAVE_HOURS_PER_YEAR = 23 * 8; // 184 uur

function weeklyNetHours(schedule) {
  var sched = schedule || defaultSchedule();
  return DAY_KEYS.reduce(function (sum, key) { return sum + shiftWorkedHours(sched[key]); }, 0);
}

function suggestedAnnualLeaveHours(schedule) {
  var weekly = weeklyNetHours(schedule);
  var suggestion = (weekly / FULLTIME_WEEKHOURS) * FULLTIME_LEAVE_HOURS_PER_YEAR;
  return Math.round(suggestion * 10) / 10;
}

// ------------------------------------------------------------
// Voorstel verlofurenbudget per jaar, o.b.v. het rooster
// ------------------------------------------------------------
// Contract: bij een voltijds dienstverband van 40 uur/week heeft iemand
// recht op 23 vakantiedagen per jaar (exclusief feestdagen). Bij een
// werkweek van 5 dagen komt dat neer op 8 uur/dag => 184 uur/jaar voltijds.
// Voor iedereen anders wordt dit naar rato berekend op basis van het aantal
// uren dat diegene volgens zijn/haar eigen rooster per week werkt.
var FULLTIME_WEEKLY_HOURS = 40;
var FULLTIME_ANNUAL_LEAVE_DAYS = 23;
var FULLTIME_ANNUAL_LEAVE_HOURS = FULLTIME_ANNUAL_LEAVE_DAYS * (FULLTIME_WEEKLY_HOURS / 5); // 184 uur

function weeklyContractedHours(schedule) {
  var sched = schedule || defaultSchedule();
  var total = 0;
  for (var i = 0; i < DAY_KEYS.length; i++) total += shiftWorkedHours(sched[DAY_KEYS[i]]);
  return total;
}
function suggestedAnnualLeaveHours(schedule) {
  var weekly = weeklyContractedHours(schedule);
  return Math.round((weekly / FULLTIME_WEEKLY_HOURS) * FULLTIME_ANNUAL_LEAVE_HOURS * 10) / 10;
}

function saldoFor(emp, requests) {
  var base = Number(emp.baseSaldo) || 0;
  var used = 0, overtime = 0;
  for (var i = 0; i < requests.length; i++) {
    var r = requests[i];
    if (r.employeeId !== emp.id || r.status !== "approved") continue;
    if (r.type === "verlof") used += Number(r.hours) || 0;
    if (r.type === "overuren") overtime += Number(r.hours) || 0;
  }
  return base - used + overtime;
}
function sumHours(requests, empId, type, status) {
  return requests
    .filter(function (r) { return r.employeeId === empId && r.type === type && r.status === status; })
    .reduce(function (s, r) { return s + (Number(r.hours) || 0); }, 0);
}

// Vindt collega's die in dezelfde periode al verlof hebben (goedgekeurd of
// in aanvraag), zodat je in één oogopslag ziet of de bezetting krap wordt.
function findOverlappingColleagues(requests, employees, excludeEmployeeId, startISO, endISO) {
  if (!startISO || !endISO) return [];
  var nameFor = function (id) { var e = employees.find(function (x) { return x.id === id; }); return e ? e.name : "Onbekend"; };
  return requests
    .filter(function (r) {
      return r.type === "verlof" && r.employeeId !== excludeEmployeeId && r.status !== "rejected" &&
        r.startDate <= endISO && r.endDate >= startISO;
    })
    .map(function (r) { return { name: nameFor(r.employeeId), startDate: r.startDate, endDate: r.endDate, status: r.status }; })
    .sort(function (a, b) { return a.name.localeCompare(b.name); });
}

var WEEKDAG_KOPPEN = ["Ma", "Di", "Wo", "Do", "Vr", "Za", "Zo"];

// Eigen kalenderwidget voor het kiezen van een periode: de begindatum blijft
// gemarkeerd zichtbaar terwijl je de einddatum kiest, in plaats van twee
// losse (native) datumvelden die niets met elkaar te maken lijken te hebben.
function DateRangePicker(props) {
  var startDate = props.startDate, endDate = props.endDate, onChange = props.onChange;
  var todayIso = todayISO();
  var initial = new Date((startDate || todayIso) + "T00:00:00");
  var _view = useState({ y: initial.getFullYear(), m: initial.getMonth() }), view = _view[0], setView = _view[1];

  var year = view.y, month = view.m;
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var leading = (new Date(year, month, 1).getDay() + 6) % 7; // maandag = 0

  function isoOf(d) { return year + "-" + pad2(month + 1) + "-" + pad2(d); }
  function prevMonth() { if (month === 0) setView({ y: year - 1, m: 11 }); else setView({ y: year, m: month - 1 }); }
  function nextMonth() { if (month === 11) setView({ y: year + 1, m: 0 }); else setView({ y: year, m: month + 1 }); }

  // Geen verborgen "fase" meer — de knop bepaalt puur op basis van de
  // zichtbare begin-/einddatum wat een volgende tik betekent, zodat hij
  // nooit in een onzichtbare, verkeerde staat kan vastlopen.
  function handleClick(iso) {
    if (startDate !== endDate) {
      onChange(iso, iso); // er stond al een volledige periode -> begin opnieuw
    } else if (iso === startDate) {
      // zelfde dag nogmaals aangetikt: niets veranderen
    } else if (iso < startDate) {
      onChange(iso, iso);
    } else {
      onChange(startDate, iso);
    }
  }

  var cells = [];
  for (var i = 0; i < leading; i++) cells.push(null);
  for (var d = 1; d <= daysInMonth; d++) cells.push(d);

  return h("div", { className: "rounded-xl border border-slate-200 p-3" },
    h("div", { className: "mb-2 flex flex-wrap items-center justify-between gap-1 text-sm" },

        h("span", { className: "text-slate-500" }, "Van "), h("strong", { className: "text-slate-800" }, fmtDatumKort(startDate)),
        h("span", { className: "text-slate-500" }, " tot en met "), h("strong", { className: "text-slate-800" }, fmtDatumKort(endDate))
      ),
      h("button", { type: "button", className: "text-xs font-medium text-teal-700 hover:underline", onClick: function () { onChange(todayIso, todayIso); } }, "Vandaag")
    ),
    h("p", { className: "mb-2 text-xs font-medium text-teal-700" },
      startDate === endDate ? "Tik een latere dag aan om een periode te kiezen (of laat dit staan voor 1 dag)" : "Tik een nieuwe dag aan om een andere periode te beginnen"
    ),
    h("div", { className: "mb-1 flex items-center justify-between" },
      h("button", { type: "button", className: "rounded-lg px-2 py-1 text-slate-500 hover:bg-slate-100", onClick: prevMonth, "aria-label": "Vorige maand" }, "←"),
      h("span", { className: "text-sm font-semibold capitalize text-slate-700" }, MONTH_LABELS[month] + " " + year),
      h("button", { type: "button", className: "rounded-lg px-2 py-1 text-slate-500 hover:bg-slate-100", onClick: nextMonth, "aria-label": "Volgende maand" }, "→")
    ),
    h("div", { className: "grid grid-cols-7 gap-y-1 text-center text-[11px] font-medium text-slate-400" },
      WEEKDAG_KOPPEN.map(function (w) { return h("div", { key: w }, w); })
    ),
    h("div", { className: "grid grid-cols-7 gap-y-1" },
      cells.map(function (d, idx) {
        if (!d) return h("div", { key: "b" + idx });
        var iso = isoOf(d);
        var isStart = iso === startDate, isEnd = iso === endDate;
        var inRange = startDate && endDate && iso > startDate && iso < endDate;
        var isToday = iso === todayIso;
        var cls = "flex h-9 items-center justify-center text-sm transition cursor-pointer select-none ";
        if (isStart && isEnd) cls += "rounded-lg bg-teal-700 font-semibold text-white";
        else if (isStart) cls += "rounded-l-lg bg-teal-700 font-semibold text-white";
        else if (isEnd) cls += "rounded-r-lg bg-teal-700 font-semibold text-white";
        else if (inRange) cls += "bg-teal-100 text-teal-800";
        else cls += "rounded-lg text-slate-700 hover:bg-slate-100" + (isToday ? " ring-1 ring-inset ring-teal-300" : "");
        return h("div", { key: iso, className: cls, onClick: function () { handleClick(iso); } }, d);
      })
    )
  );
}
