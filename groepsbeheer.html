async function dbGet(key){

}

function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="style"&&typeof attrs[k]==="object"){Object.assign(e.style,attrs[k]);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);}
    else if(k==="checked"){e.checked=attrs[k];}
    else if(k==="value"&&(tag==="input"||tag==="select")){e.value=attrs[k];}
    else if(k==="htmlFor"){e.htmlFor=attrs[k];}
    else{e.setAttribute(k,attrs[k]);}
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false)return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
    });
  }
  return e;
}

function plekLabel(ac,sc,rc,MAX){var t=MAX-ac-rc,tmp=sc>t?t:sc,p=t-tmp;if(p>0&&tmp>0)return p+" plek"+(p!==1?"ken":"")+" vrij + "+tmp+" tijdelijk";if(tmp>0)return tmp+" tijdelijk vrij";if(p>0)return p+" plek"+(p!==1?"ken":"")+" vrij";return"Vol";}
function gStatus(ac,sc,rc,MAX){var t=MAX-ac-rc,tmp=sc>t?t:sc,p=t-tmp;if(ac+rc>=MAX)return"full";if(p>0)return"free";return"temp";}
function calcNotifs(groups,waitlist,MAX){
  var n=[];
  for(var i=0;i<groups.length;i++){
    var g=groups[i],ac=0,sc=0,rc=0;
    for(var j=0;j<g.members.length;j++){var m=g.members[j];if(m.reserved)rc++;else if(m.stopped)sc++;else ac++;}
    if(ac+rc<MAX){
      var matches=[];
      for(var k=0;k<waitlist.length;k++){var w=waitlist[k];if(w.availability&&w.availability[g.day]&&w.availability[g.day][g.time])matches.push(w.naam||"");}
      if(matches.length>0){var tf=MAX-ac-rc,tmp=sc>tf?tf:sc,perm=tf-tmp;var pi=perm>0&&tmp>0?perm+" plek"+(perm!==1?"ken":"")+" vrij + "+tmp+" tijdelijk":perm>0?perm+" plek"+(perm!==1?"ken":"")+" vrij":tmp+" tijdelijk vrij";n.push({group:g.day+" "+g.time,matches:matches,plekInfo:pi,onlyTemp:perm===0});}
    }
  }
  return n;
}
function availSummary(av){if(!av)return"";var parts=[];for(var i=0;i<DAY_ORDER.length;i++){var day=DAY_ORDER[i];if(!av[day])continue;var times=Object.keys(av[day]).filter(function(t){return av[day][t];});if(times.length>0)parts.push(day.substring(0,2)+": "+times.join(", "));}return parts.join(" | ");}
