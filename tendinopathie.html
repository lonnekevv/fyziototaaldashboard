      #print-overlay .legenda { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }

      #print-overlay .advies-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
      #print-overlay .advies-item { background: #fff; border-radius: 8px; padding: 10px 12px; }
      #print-overlay .advies-item strong { display: block; font-size: 11px; margin-bottom: 3px; }
      #print-overlay .advies-item span { font-size: 10.5px; color: #6b7280; line-height: 1.4; }

<body>
  <div id="root"></div>

  <script type="text/babel">
    var { useState } = React;

    var OORZAKEN = [

      "Plotselinge toename van activiteit",
      "Verandering van ondergrond of schoeisel",

    var FASEN = [
      { id: "acuut", label: "Fase 1", labelInvoer: "Fase 1 — Reactief", kleur: "#2d6b55", kleurLight: "#e8f2ee" },

      { id: "degeneratief", label: "Fase 3", labelInvoer: "Fase 3 — Degeneratief", kleur: "#b94a2c", kleurLight: "#fdf0ec" },
    ];

    var SYMPTOMEN = {
      acuut: [
        "Pijn bij belasten en opstarten",

        "Drukpijn op de pees",
        "Mogelijk lichte zwelling",

      dysrepair: [

        { titel: "Begin met rustige spieroefeningen", tekst: "Je kunt beginnen met oefeningen waarbij je spanning opbouwt zonder te bewegen, bijvoorbeeld door de spier aan te spannen terwijl je been of arm stilstaat. Dit houdt de pees actief zonder extra belasting." },

        { titel: "Zwaar en langzaam trainen werkt het beste", tekst: "Oefeningen met veel weerstand en een trage, gecontroleerde beweging stimuleren de pees het meest effectief. Je therapeut bepaalt de dosering." },

    var isOverbelasting = function(oorzaak) {
      return oorzaak === "Overbelasting (te veel/te intensief)" || oorzaak === "Plotselinge toename van activiteit";

    var isOnderbelasting = function(oorzaak) {

    var callClaude = async function(prompt, apiKey) {
      var res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      if (!res.ok) throw new Error("API error " + res.status);
      var data = await res.json();
      return data.content.map(function(b) { return b.text || ""; }).join("") || "";
    };

    function maakSVG(fase, width, height) {

          }
          var isA = r === 2 || r === 4;
          paden.push("<path d='" + d + "' stroke='" + (isA ? "#2d6b55" : "#8ba89e") + "' stroke-width='" + (isA ? 2 : 1.4) + "' fill='none' stroke-linecap='round' opacity='" + (isA ? 1 : 0.65) + "'/>");

          var off = r * 3.7;
          for (var x = 8; x <= width - 8; x += 5) {
            var amp = 4 + 2 * Math.sin(r * 1.3);
            d += " L" + x + "," + (y + amp * Math.sin(((x + off) / 14) * Math.PI));
          }
          var isV = r === 1 || r === 3 || r === 5;
          paden.push("<path d='" + d + "' stroke='" + (isV ? "#c09a2a" : "#8ba89e") + "' stroke-width='" + (isV ? 2.2 : 1.4) + "' fill='none' stroke-linecap='round' opacity='" + (isV ? 0.95 : 0.55) + "'/>");
        } else {
          var off = r * 5.1;
          for (var x = 8; x <= width - 8; x += 4) {
            var amp = 6 + 3 * Math.abs(Math.sin(r * 0.9));
            var freq = 10 + r % 3 * 3;
            d += " L" + x + "," + (y + amp * Math.sin(((x + off) / freq) * Math.PI));
          }
          var isZ = r % 2 === 0;
          paden.push("<path d='" + d + "' stroke='" + (isZ ? "#b94a2c" : "#8ba89e") + "' stroke-width='" + (isZ ? 2.4 : 1.3) + "' fill='none' stroke-linecap='round' opacity='" + (isZ ? 1 : 0.45) + "'/>");
        }
      }
      var extra = "";
      if (fase === "acuut") extra = "<ellipse cx='" + (width*0.5) + "' cy='" + (height/2) + "' rx='38' ry='" + (height*0.38) + "' fill='#2d6b55' fill-opacity='0.08' stroke='#2d6b55' stroke-width='1' stroke-dasharray='4,3'/>";
      if (fase === "dysrepair") extra = "<path d='M" + (width*0.45) + ",10 Q" + (width*0.5) + "," + (height/2) + " " + (width*0.42) + "," + (height-10) + "' stroke='#c0392b' stroke-width='1.5' fill='none' opacity='0.55'/><path d='M" + (width*0.62) + ",15 Q" + (width*0.67) + "," + (height/2) + " " + (width*0.58) + "," + (height-12) + "' stroke='#c0392b' stroke-width='1.2' fill='none' opacity='0.45'/>";
      if (fase === "degeneratief") {

    function EmmerVisualisatie(props) {

      if (isOverbelasting(oorzaak)) {

          React.createElement("div", { style: { flexShrink: 0 } },

          React.createElement("div", { style: { flexShrink: 0 } },

              React.createElement("text", { x: "30", y: "62", textAnchor: "middle", fontSize: "9", fill: kleur, fontWeight: "700" }, "20%")
            )
          ),
          React.createElement("div", null,
            React.createElement("p", { style: { margin: "0 0 3px", fontSize: 12, fontWeight: 700, color: kleur } }, "Te weinig prikkel"),
            React.createElement("p", { style: { margin: 0, fontSize: 11, color: G.textMuted, lineHeight: 1.5 } },
              "Je pees heeft te weinig beweging gekregen om sterk te blijven. Peesweefsel heeft regelmatige belasting nodig om gezond te blijven. De oplossing is een geleidelijke, opbouwende aanpak."
            )
          )
        );
      }

      return React.createElement("div", { style: { padding: "12px 16px", background: "#f8f5ff", borderTop: "1px solid " + G.grayBorder } },
        React.createElement("p", { style: { margin: 0, fontSize: 11, color: G.textMuted, lineHeight: 1.5 } },

        )

    function CollagreenVezels(props) {
      var fase = props.fase;
      var width = props.width || 220;
      var height = props.height || 90;
      var vezels = [];
      var rows = 7;

          }

          vezels.push(React.createElement("path", { key: r, d: d, stroke: isAangedaan ? "#2d6b55" : "#8ba89e", strokeWidth: isAangedaan ? 2 : 1.4, fill: "none", strokeLinecap: "round", opacity: isAangedaan ? 1 : 0.65 }));
        } else if (fase === "dysrepair") {

          var offset = r * 3.7;
          for (var x = 8; x <= width - 8; x += 5) {
            var amp = 4 + 2 * Math.sin(r * 1.3);
            d += " L" + x + "," + (y + amp * Math.sin(((x + offset) / 14) * Math.PI));
          }
          var isVerstoord = r === 1 || r === 3 || r === 5;
          vezels.push(React.createElement("path", { key: r, d: d, stroke: isVerstoord ? "#c09a2a" : "#8ba89e", strokeWidth: isVerstoord ? 2.2 : 1.4, fill: "none", strokeLinecap: "round", opacity: isVerstoord ? 0.95 : 0.55 }));
