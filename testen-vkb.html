f voor sportieve recreatieve populatie zonder roei-ervaring)."],velden:[{id:"roei_tijd",label:"Tijd (mm:ss)",isRoeien:true},{id:"roei_damper",label:"Damperstand"}]}];
const RAPPORT_GROEPEN={quadriceps_lag:[[{id:"actieve_extensie",l:"Actieve extensie",e:"°"},{id:"passieve_extensie",l:"Passieve extensie",e:"°"}],[{id:"quad_lag",l:"Quadriceps lag",e:"°"}]],stroke_test:[[{id:"stroke_graad",l:"Graad"}]],beenomtrek:[[{id:"been_niet",l:"Niet-aangedaan",e:"cm"},{id:"been_aangedaan",l:"Aangedaan",e:"cm"}],[{id:"been_verschil",l:"Verhouding",e:"%"}]],rom_flexie:[[{id:"rom_act",l:"Actieve flexie",e:"°"},{id:"rom_pas",l:"Passieve flexie",e:"°"}]],hhd:[[{id:"hhd_ham_niet",l:"Ham niet-aangedaan",e:"kg"},{id:"hhd_ham_aan",l:"Ham aangedaan",e:"kg"}],[{id:"hhd_ham_lsi",l:"Ham LSI",e:"%",lsi:"kracht"}],[{id:"hhd_quad_niet",l:"Quad niet-aangedaan",e:"kg"},{id:"hhd_quad_aan",l:"Quad aangedaan",e:"kg"}],[{id:"hhd_quad_lsi",l:"Quad LSI",e:"%",lsi:"kracht"},{id:"hhd_hq",l:"H:Q ratio",e:"%"}]],een_rm:[[{id:"rm_qn_1rm",l:"Quad niet-aangedaan 1RM",e:"kg"},{id:"rm_qa_1rm",l:"Quad aangedaan 1RM",e:"kg"}],[{id:"rm_q_lsi",l:"Quad LSI",e:"%",lsi:"kracht"}],[{id:"rm_hn_1rm",l:"Ham niet-aangedaan 1RM",e:"kg"},{id:"rm_ha_1rm",l:"Ham aangedaan 1RM",e:"kg"}],[{id:"rm_h_lsi",l:"Ham LSI",e:"%",lsi:"kracht"},{id:"rm_hq",l:"H:Q ratio",e:"%"}],[{id:"rm_nprs",l:"Pijnscore NPRS"}]],slh:[[{id:"slh_niet",l:"Niet-aangedaan",e:"cm"},{id:"slh_aan",l:"Aangedaan",e:"cm"}],[{id:"slh_lsi",l:"LSI",e:"%",lsi:"hop"}]],thd:[[{id:"thd_niet",l:"Niet-aangedaan",e:"cm"},{id:"thd_aan",l:"Aangedaan",e:"cm"}],[{id:"thd_lsi",l:"LSI",e:"%",lsi:"hop"}]],sh:[[{id:"sh_niet",l:"Niet-aangedaan",e:"keer"},{id:"sh_aan",l:"Aangedaan",e:"keer"}],[{id:"sh_lsi",l:"LSI",e:"%",lsi:"hop"}]],vj:[[{id:"vj_niet",l:"Niet-aangedaan",e:"cm"},{id:"vj_aan",l:"Aangedaan",e:"cm"}],[{id:"vj_lsi",l:"LSI",e:"%",lsi:"hop"}]],plank:[[{id:"plank_sec",l:"Tijd",e:"sec",isPlank:true}]],roeien:[[{id:"roei_tijd",l:"Tijd",isRoeien:true}],[{id:"roei_damper",l:"Damperstand"}]]};

function lsi(a,b){if(!a||!b||Number(b)===0)return"";return((Number(a)/Number(b))*100).toFixed(1);}
function rm1(g,r){if(!g||!r)return"";const rn=Number(r);if(rn<1)return"";return(Number(g)/(1.0278-0.0278*rn)).toFixed(1);}
function calcW(id,w){const n={...w};if(id==="quadriceps_lag"&&n.actieve_extensie!==""&&n.passieve_extensie!=="")n.quad_lag=Math.abs(Number(n.passieve_extensie)-Number(n.actieve_extensie)).toFixed(1);if(id==="beenomtrek")n.been_verschil=lsi(n.been_aangedaan,n.been_niet);if(id==="een_rm"){n.rm_qn_1rm=rm1(n.rm_qn_g,n.rm_qn_r);n.rm_qa_1rm=rm1(n.rm_qa_g,n.rm_qa_r);n.rm_hn_1rm=rm1(n.rm_hn_g,n.rm_hn_r);n.rm_ha_1rm=rm1(n.rm_ha_g,n.rm_ha_r);n.rm_q_lsi=lsi(n.rm_qa_1rm,n.rm_qn_1rm);n.rm_h_lsi=lsi(n.rm_ha_1rm,n.rm_hn_1rm);const ha=Number(n.rm_ha_1rm),qa=Number(n.rm_qa_1rm);if(ha&&qa)n.rm_hq=((ha/qa)*100).toFixed(1);}if(id==="slh")n.slh_lsi=lsi(n.slh_aan,n.slh_niet);if(id==="thd")n.thd_lsi=lsi(n.thd_aan,n.thd_niet);if(id==="sh")n.sh_lsi=lsi(n.sh_aan,n.sh_niet);if(id==="vj")n.vj_lsi=lsi(n.vj_aan,n.vj_niet);return n;}
function calcHHD(w){const n={...w};n.hhd_ham_lsi=lsi(n.hhd_ham_aan,n.hhd_ham_niet);n.hhd_quad_lsi=lsi(n.hhd_quad_aan,n.hhd_quad_niet);const ha=Number(n.hhd_ham_aan),qa=Number(n.hhd_quad_aan);if(ha&&qa)n.hhd_hq=((ha/qa)*100).toFixed(1);return n;}
function lsiKleur(v,type,fase){if(v===""||v===undefined)return null;const n=Number(v),d=LSI_DREMPEL[type]?.[fase];if(d===null)return{bg:C.groenLight,col:C.groen};if(n>=d)return{bg:C.okLight,col:C.ok};if(n>=d-10)return{bg:C.oranjeLight,col:C.oranje};return{bg:C.roodLight,col:C.rood};}
function plankKleur(sec){const n=Number(sec);if(n>=120)return{bg:C.okLight,col:C.ok,label:"Goed (≥120 sec)"};if(n>=60)return{bg:C.oranjeLight,col:C.oranje,label:"Matig (60–119 sec)"};return{bg:C.roodLight,col:C.rood,label:"Onvoldoende (<60 sec)"};}
function tijdNaarSec(str){if(!str)return null;const p=str.split(":");if(p.length===2){const m=parseInt(p[0]),s=parseFloat(p[1]);if(!isNaN(m)&&!isNaN(s))return m*60+s;}return null;}
function roeiKleur(str){const sec=tijdNaarSec(str);if(sec===null)return null;if(sec<150)return{bg:C.okLight,col:C.ok,label:"Goed (<2:30)"};return{bg:C.oranjeLight,col:C.oranje,label:"Ruimte voor verbetering (≥2:30)"};}
function badge(bg,col,tekst){return`<span class="badge" style="background:${bg};color:${col}">${tekst}</span>`;}
function lsiBadge(v,type,fase){const k=lsiKleur(v,type,fase);return k?badge(k.bg,k.col,Number(v).toFixed(1)+"%"):"";}

function renderMeetmoment(){

  const faseTesten=TESTEN_PER_FASE[mm.fase]||[];
  const testen=TESTEN.filter(t=>faseTesten.includes(t.id));
  const cats=[...new Set(testen.map(t=>t.cat))];
  const vl=FASE_VLAGGEN[mm.fase];
  const heeftVl=(vl?.geel?.length||0)+(vl?.rood?.length||0)>0;
  const critRijen=criteria.map((c,i)=>`<div class="ft-crit-row"><span style="font-size:14px;flex:1;padding-right:8px">${c}</span><div style="display:flex;gap:6px;flex-shrink:0"><button class="${S.crit[c]==="ja"?"ft-ja":"ft-neutral"}" onclick="setCrit(${JSON.stringify(c)},'ja')">Ja</button><button class="${S.crit[c]==="nee"?"ft-nee":"ft-neutral"}" onclick="setCrit(${JSON.stringify(c)},'nee')">Nee</button></div></div>`).join("");
  const vlagHTML=S.toonVlaggen&&vl?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">${vl.geel.length?`<div class="vlag-blok" style="background:${C.geelLight};border:1px solid #fcd34d"><div style="font-size:12px;font-weight:500;color:${C.geel};margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">🟡 Gele vlaggen</div>${vl.geel.map(g=>`<div style="font-size:13px;color:#78350f;margin-bottom:2px">· ${g}</div>`).join("")}</div>`:""}${vl.rood.length?`<div class="vlag-blok" style="background:${C.roodLight};border:1px solid #fca5a5"><div style="font-size:12px;font-weight:500;color:${C.rood};margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">🔴 Rode vlaggen</div>${vl.rood.map(r=>`<div style="font-size:13px;color:#7f1d1d;margin-bottom:2px">· ${r}</div>`).join("")}</div>`:""}</div>`:"";
  const testenHTML=cats.map(cat=>{const rijen=testen.filter(t=>t.cat===cat).map(t=>{const ged=!!mm.testen?.[t.id];const lsiV=t.velden.find(v=>v.ber&&v.lsiType);const lsiVal=ged&&lsiV?mm.testen[t.id]?.waarden?.[lsiV.id]:"";const plankVal=ged&&t.isPlank?mm.testen[t.id]?.waarden?.plank_sec:null;const roeiVal=ged&&t.isRoeien?mm.testen[t.id]?.waarden?.roei_tijd:null;let extra="";if(lsiVal)extra=` ${lsiBadge(lsiVal,lsiV.lsiType,mm.fase)}`;else if(plankVal){const k=plankKleur(plankVal);extra=` ${badge(k.bg,k.col,k.label)}`;}else if(roeiVal){const k=roeiKleur(roeiVal);if(k)extra=` ${badge(k.bg,k.col,roeiVal)}`;}else if(ged)extra=` <span style="font-size:12px;color:${C.ok};font-weight:500">✓</span>`;return`<div class="ft-test-row"><div style="flex:1;margin-right:8px"><span style="font-size:14px;font-weight:500">${t.naam}</span>${extra}</div><button class="ft-btn-sm" onclick="startTest('${t.id}')">${ged?"Bewerken":"Starten"}</button></div>`;}).join("");return`<div style="font-size:13px;font-weight:500;color:${C.groenAccent};text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 6px">${cat}</div><div class="ft-card" style="padding:.25rem 1rem">${rijen}</div>`;}).join("");
  return`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <button class="ft-btn-s" style="padding:7px 14px;font-size:13px" onclick="S.sc='dashboard';render()">← Dashboard</button>
      <div style="flex:1"><div style="font-size:16px;font-weight:500;color:${C.groen}">${mm.faseNaam}</div><div style="font-size:13px;color:${C.muted}">${mm.datum} · Patiënt ${S.patNr}</div></div>
      ${heeftVl?`<button class="ft-btn-sm" style="${S.toonVlaggen?`background:${C.roodLight};border-color:${C.rood}`:""}" onclick="S.toonVlaggen=!S.toonVlaggen;render()">⚑ Vlaggen</button>`:""}
    </div>
    ${vlagHTML}
    <div class="ft-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:15px;font-weight:500;color:${C.groen}">Fase-criteria checklist</div>${allJa?`<span class="badge" style="background:${C.okLight};color:${C.ok}">Alle criteria behaald ✓</span>`:""}</div>${critRijen}<div style="margin-top:12px;display:flex;align-items:center;gap:10px"><button class="ft-btn-p" onclick="saveCrit()">Opslaan</button>${S.ok?`<span class="ok-msg">Opgeslagen!</span>`:""}</div></div>

function renderHHD(){
  const sub=HHD_STAPPEN[S.hhdStap];
  const isLaatste=S.hhdStap===HHD_STAPPEN.length-1;
  const tabs=HHD_STAPPEN.map((s,i)=>`<button class="${i===S.hhdStap?"ft-tab-act":"ft-tab"}" onclick="S.hhdStap=${i};render()">${s.label}</button>`).join("");
  let content="";
  if(sub.type==="inst"){
    const stappen=sub.stappen.map((s,i)=>`<div style="display:flex;gap:10px;margin-bottom:10px"><div style="min-width:22px;height:22px;border-radius:50%;background:${C.groenLight};color:${C.groen};font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div><div style="font-size:14px;line-height:1.6">${s}</div></div>`).join("");
    content=`<div class="ft-card"><div style="font-size:13px;font-weight:500;color:${C.groenAccent};text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">${sub.spier} – ${sub.label.split(" – ")[1]}</div>${stappen}<div style="display:flex;gap:8px;margin-top:4px">${S.hhdStap>0?`<button class="ft-btn-s" onclick="S.hhdStap--;render()">← Vorige</button>`:""}<button class="ft-btn-p" onclick="S.hhdStap++;render()">Volgende →</button></div></div>`;
  } else {
    const velden=sub.velden.map(v=>{const val=S.waarden[v.id]||"";if(v.ber){const k=v.lsiType?lsiKleur(val,v.lsiType,S.mm?.fase):null;const disp=val!==""?(k?badge(k.bg,k.col,Number(val).toFixed(1)+"%"):`<strong style="color:${C.groen}">${val}${v.een||""}</strong>`):`<span style="color:${C.muted}">—</span>`;return`<div style="margin-bottom:12px"><div style="font-size:13px;color:${C.muted};margin-bottom:4px">${v.label}${v.een?" ("+v.een+")":""}</div><div style="padding:9px 12px;background:${C.grijs};border-radius:8px;display:flex;align-items:center;gap:8px">${disp}<span style="font-size:12px;color:${C.muted}">automatisch</span></div></div>`;}return`<div style="margin-bottom:12px"><div style="font-size:13px;color:${C.muted};margin-bottom:4px">${v.label}${v.een?" ("+v.een+")":""}</div><input class="ft-input" type="number" value="${val}" oninput="S.waarden=calcHHD({...S.waarden,[this.dataset.id]:this.value});render()" data-id="${v.id}"/></div>`;}).join("");
    content=`<div class="ft-card"><div style="font-size:13px;font-weight:500;color:${C.groenAccent};text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">${sub.spier} – Resultaten</div>${velden}<div class="save-row"><button class="ft-btn-s" onclick="S.hhdStap--;render()">← Terug</button>${isLaatste?`<button class="ft-btn-s" onclick="saveHHD(false)">Opslaan</button><button class="ft-btn-p" onclick="saveHHD(true)">Opslaan & afronden →</button>`:`<button class="ft-btn-p" onclick="S.hhdStap++;render()">Volgende: Quadriceps →</button>`}${S.ok?`<span class="ok-msg">Opgeslagen!</span>`:""}</div></div>`;
  }
  return`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="ft-btn-s" style="padding:7px 14px;font-size:13px" onclick="S.sc='meetmoment';render()">← Terug</button>
      <div><div style="font-size:16px;font-weight:500;color:${C.groen}">Handheld Dynamometer (HHD)</div><div style="font-size:13px;color:${C.muted}">Patiënt ${S.patNr}</div></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">${tabs}</div>
    ${content}`;
}

function renderTest(){
  const t=S.test;const voorbij=S.stap>=t.stappen.length;
  let content="";
  if(!voorbij){
    const dots=t.stappen.map((_,i)=>`<div class="stap-dot" style="background:${i<=S.stap?C.groenAccent:C.grijsBorder}" onclick="S.stap=${i};render()"></div>`).join("");
    content=`<div class="ft-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:13px;color:${C.muted}">Stap ${S.stap+1} van ${t.stappen.length}</span><div style="display:flex;gap:5px">${dots}</div></div><div style="font-size:15px;line-height:1.7;margin-bottom:16px;min-height:60px">${t.stappen[S.stap]}</div><div style="display:flex;gap:8px">${S.stap>0?`<button class="ft-btn-s" onclick="S.stap--;render()">← Vorige</button>`:""}<button class="ft-btn-p" onclick="S.stap++;render()">${S.stap===t.stappen.length-1?"Registreren →":"Volgende →"}</button></div></div>`;
  } else {
    const normInfo=t.isPlank?`<div class="norm-info">Normwaarden: &lt;60 sec = onvoldoende · 60–119 sec = matig · ≥120 sec = goed</div>`:t.isRoeien?`<div class="norm-info">Referentie: &lt;2:30 = goed · ≥2:30 = ruimte voor verbetering (indicatief, recreatieve sportieve populatie)</div>`:"";
    const velden=t.velden.map(v=>{const val=S.waarden[v.id]||"";if(v.ber){const k=v.lsiType?lsiKleur(val,v.lsiType,S.mm?.fase):null;const disp=val!==""?(k?badge(k.bg,k.col,Number(val).toFixed(1)+"%"):`<strong style="color:${C.groen}">${val}${v.een||""}</strong>`):`<span style="color:${C.muted}">—</span>`;return`<div style="margin-bottom:12px"><div style="font-size:13px;color:${C.muted};margin-bottom:4px">${v.label}${v.een?" ("+v.een+")":""}</div><div style="padding:9px 12px;background:${C.grijs};border-radius:8px;display:flex;align-items:center;gap:8px">${disp}<span style="font-size:12px;color:${C.muted}">automatisch</span></div></div>`;}if(v.isRoeien){const k=roeiKleur(val);return`<div style="margin-bottom:12px"><div style="font-size:13px;color:${C.muted};margin-bottom:4px">${v.label}</div><input class="ft-input" type="text" placeholder="bijv. 2:15" value="${val}" oninput="S.waarden={...S.waarden,[this.dataset.id]:this.value};render()" data-id="${v.id}"/>${val&&k?`<div style="margin-top:6px">${badge(k.bg,k.col,k.label)}</div>`:""}</div>`;}if(v.isPlank){const k=val?plankKleur(val):null;return`<div style="margin-bottom:12px"><div style="font-size:13px;color:${C.muted};margin-bottom:4px">${v.label} (${v.een})</div><input class="ft-input" type="number" placeholder="seconden" value="${val}" oninput="S.waarden={...S.waarden,[this.dataset.id]:this.value};render()" data-id="${v.id}"/>${val&&k?`<div style="margin-top:6px">${badge(k.bg,k.col,k.label)}</div>`:""}</div>`;}if(v.sel){const opts=v.opties.map(([w,l])=>`<option value="${w}" ${val===w?"selected":""}>${l}</option>`).join("");return`<div style="margin-bottom:12px"><div style="font-size:13px;color:${C.muted};margin-bottom:4px">${v.label}</div><select class="ft-input" onchange="S.waarden=calcW(S.test.id,{...S.waarden,[this.dataset.id]:this.value});render()" data-id="${v.id}">${opts}</select></div>`;}return`<div style="margin-bottom:12px"><div style="font-size:13px;color:${C.muted};margin-bottom:4px">${v.label}${v.een?" ("+v.een+")":""}</div><input class="ft-input" type="number" value="${val}" oninput="S.waarden=calcW(S.test.id,{...S.waarden,[this.dataset.id]:this.value});render()" data-id="${v.id}"/></div>`;}).join("");
    content=`<div class="ft-card"><div style="font-size:15px;font-weight:500;color:${C.groen};margin-bottom:14px">Resultaten invoeren</div>${normInfo}${velden}<div style="margin-bottom:12px"><div style="font-size:13px;color:${C.muted};margin-bottom:4px">Notities</div><textarea id="test-not" class="ft-input">${S.waarden._notitie||""}</textarea></div><div class="save-row"><button class="ft-btn-s" onclick="saveTest(false)">Opslaan</button><button class="ft-btn-p" onclick="saveTest(true)">Opslaan & afronden →</button>${S.ok?`<span class="ok-msg">Opgeslagen!</span>`:""}</div></div>`;
  }
  return`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="ft-btn-s" style="padding:7px 14px;font-size:13px" onclick="S.sc='meetmoment';render()">← Terug</button>
      <div><div style="font-size:15px;font-weight:500;color:${C.groen}">${t.naam}</div><div style="font-size:13px;color:${C.muted}">Patiënt ${S.patNr}</div></div>
    </div>${content}`;
}

function renderRapport(){
  const m=S.rapMm;if(!m)return"";
  const eerder=(S.patData?.meetmomenten||[]).filter(x=>x.datum<m.datum);
  const criteria=FASE_CRITERIA[m.fase]||[];
  const jaC=criteria.filter(c=>m.criteria?.[c]==="ja").length;
  const faseTesten=TESTEN_PER_FASE[m.fase]||[];
  const rapTesten=TESTEN.filter(t=>faseTesten.includes(t.id)&&t.id!=="galn");
  const critHTML=criteria.map((c,i)=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:${i<criteria.length-1?"1px solid "+C.grijsBorder:"none"}"><span>${c}</span><span style="font-weight:500;color:${m.criteria?.[c]==="ja"?C.ok:m.criteria?.[c]==="nee"?C.rood:C.muted}">${m.criteria?.[c]==="ja"?"Ja":m.criteria?.[c]==="nee"?"Nee":"—"}</span></div>`).join("");
  let galnHTML="";
  if(m.testen?.galn){const r=m.testen.galn,w=r.waarden||{};const jaI=GALN_ITEMS.filter(i=>w[i.id]==="ja").length;const catRows=GALN_CATS.map(cat=>{const items=GALN_ITEMS.filter(i=>i.cat===cat&&(w[i.id]==="ja"||w[i.id]==="nee"));if(!items.length)return"";return`<div style="margin-bottom:6px"><div style="font-size:12px;color:${C.groenAccent};font-weight:500;margin-bottom:2px">${cat}</div>${items.map(item=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0"><span>${item.label}</span><span style="font-weight:500;color:${w[item.id]==="ja"?C.ok:C.rood};margin-left:8px;flex-shrink:0">${w[item.id]==="ja"?"Ja":"Nee"}</span></div>`).join("")}</div>`;}).join("");galnHTML=`<div class="ft-card"><div style="font-size:14px;font-weight:500;color:${C.groen};margin-bottom:8px">Verkorte GALN – Looppatroon</div><div style="font-size:13px;margin-bottom:8px"><span style="color:${C.muted}">Aanwezig: </span><strong>${jaI}/${GALN_ITEMS.length}</strong>${w.galn_normaal?`<span style="margin-left:12px;color:${C.muted}">Genormaliseerd: <strong style="color:${w.galn_normaal==="ja"?C.ok:C.rood}">${w.galn_normaal==="ja"?"Ja":"Nee"}</strong></span>`:""}</div>${catRows}${r.notitie?`<div style="font-size:13px;color:${C.muted};margin-top:6px">Notitie: ${r.notitie}</div>`:""}</div>`;}
  const testenHTML=rapTesten.map(t=>{const r=m.testen?.[t.id];if(!r)return"";const groepen=RAPPORT_GROEPEN[t.id]||[];const rijHTML=groepen.map(rij=>{const cols=rij.map(v=>{const val=r.waarden?.[v.id];if(!val&&val!==0)return`<div></div>`;let disp;if(v.lsi)disp=lsiBadge(val,v.lsi,m.fase);else if(v.isPlank){const k=plankKleur(val);disp=badge(k.bg,k.col,`${val} sec – ${k.label}`);}else if(v.isRoeien){const k=roeiKleur(val);disp=k?`<strong>${val}</strong> ${badge(k.bg,k.col,k.label)}`:`<strong>${val}</strong>`;}else disp=`<strong>${val}${v.e&&!v.lsi?v.e:""}</strong>`;return`<div style="font-size:13px;padding:3px 0"><span style="color:${C.muted}">${v.l}: </span>${disp}</div>`;}).join("");return`<div style="display:grid;grid-template-columns:${rij.length>1?"1fr 1fr":"1fr"};gap:4px 16px;margin-bottom:4px">${cols}</div>`;}).join("");const lsiVelden=t.velden.filter(v=>v.ber&&v.lsiType);let progHTML="";if(eerder.length&&lsiVelden.length){const prog=lsiVelden.map(v=>({l:v.label,id:v.id,type:v.lsiType,huidig:r.waarden?.[v.id],hist:eerder.map(em=>({d:em.datum,w:em.testen?.[t.id]?.waarden?.[v.id],f:em.fase})).filter(e=>e.w)})).filter(x=>x.huidig||x.hist.length);if(prog.length)progHTML=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid ${C.grijsBorder}"><div style="font-size:12px;color:${C.muted};margin-bottom:4px">Progressie</div>${prog.map(h=>`<div style="font-size:13px;margin-top:2px;display:flex;flex-wrap:wrap;gap:6px;align-items:center"><span style="color:${C.muted}">${h.l}:</span>${h.hist.map(e=>`${lsiBadge(e.w,h.type,e.f)} <span style="font-size:12px;color:${C.muted}">${e.d}</span>`).join(" ")}${h.huidig?`${lsiBadge(h.huidig,h.type,m.fase)} <span style="font-size:12px;color:${C.muted}">${m.datum}</span>`:""}</div>`).join("")}</div>`;}if(t.isPlank&&eerder.length){const hist=eerder.map(em=>({d:em.datum,w:em.testen?.[t.id]?.waarden?.plank_sec})).filter(e=>e.w);const huidig=r.waarden?.plank_sec;if(hist.length||huidig)progHTML+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid ${C.grijsBorder}"><div style="font-size:12px;color:${C.muted};margin-bottom:4px">Progressie plank</div><div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:13px">${hist.map(e=>{const k=plankKleur(e.w);return`${badge(k.bg,k.col,e.w+" sec")} <span style="font-size:12px;color:${C.muted}">${e.d}</span>`;}).join(" ")}${huidig?(()=>{const k=plankKleur(huidig);return`${badge(k.bg,k.col,huidig+" sec")} <span style="font-size:12px;color:${C.muted}">${m.datum}</span>`;})():""}</div></div>`;}if(t.isRoeien&&eerder.length){const hist=eerder.map(em=>({d:em.datum,w:em.testen?.[t.id]?.waarden?.roei_tijd})).filter(e=>e.w);const huidig=r.waarden?.roei_tijd;if(hist.length||huidig)progHTML+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid ${C.grijsBorder}"><div style="font-size:12px;color:${C.muted};margin-bottom:4px">Progressie 500m roeien</div><div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:13px">${hist.map(e=>{const k=roeiKleur(e.w);return k?`${badge(k.bg,k.col,e.w)} <span style="font-size:12px;color:${C.muted}">${e.d}</span>`:`<strong>${e.w}</strong> <span style="font-size:12px;color:${C.muted}">${e.d}</span>`;}).join(" ")}${huidig?(()=>{const k=roeiKleur(huidig);return k?`${badge(k.bg,k.col,huidig)} <span style="font-size:12px;color:${C.muted}">${m.datum}</span>`:`<strong>${huidig}</strong> <span style="font-size:12px;color:${C.muted}">${m.datum}</span>`;})():""}</div></div>`;}return`<div class="ft-card"><div style="font-size:14px;font-weight:500;color:${C.groen};margin-bottom:8px">${t.naam}</div>${rijHTML}${r.notitie?`<div style="font-size:13px;color:${C.muted};margin-top:6px">Notitie: ${r.notitie}</div>`:""}${progHTML}</div>`;}).join("");
  return`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="ft-btn-s" style="padding:7px 14px;font-size:13px" onclick="S.sc='meetmoment';render()">← Terug</button>
      <div><div style="font-size:16px;font-weight:500;color:${C.groen}">Rapport</div><div style="font-size:13px;color:${C.muted}">Patiënt ${S.patNr} · ${m.datum}</div></div>
    </div>
    <div style="background:${C.groen};border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px;color:#fff">
      <div style="font-size:13px;opacity:.75">Fyzio Totaal · UMOOOVE Knie Testen & Meten</div>
      <div style="font-size:17px;font-weight:500;margin-top:2px">${m.faseNaam}</div>
      <div style="font-size:13px;color:${C.mint};margin-top:4px">Patiënt ${S.patNr} · ${m.datum} · Aangedaan been: ${S.patData?.been||S.been}</div>
    </div>
    <div class="ft-card"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="font-size:15px;font-weight:500;color:${C.groen}">Fase-criteria</div><span style="font-size:13px;color:${C.muted}">${jaC}/${criteria.length} behaald</span></div>${critHTML}</div>
    ${galnHTML}${testenHTML}
    <div style="margin-top:16px;padding:10px 0;border-top:1px solid ${C.grijsBorder};font-size:12px;color:${C.muted}">Gegenereerd op ${new Date().toLocaleDateString("nl-NL")} · Fyzio Totaal Wierden · UMOOOVE Knie Testen & Meten</div>`;
}

// ─── ACTIES ───────────────────────────────────────────────────────
function openPat(){
  const nr=document.getElementById("inp-nr")?.value.trim();
  const b=document.getElementById("inp-been")?.value;
  if(!nr){S.fout="Voer een patiëntnummer in.";render();return;}
  S.patNr=nr;S.been=b||"Links";S.fout="";S.laden=true;render();
  loadData(nr).then(function(d){
    S.patData=d||{meetmomenten:[]};
    S.been=d?.been||S.been;
    S.laden=false;S.sc="dashboard";render();
  });
}

function nieuwMm(faseId){
  const f=FASEN.find(x=>x.id===faseId);
  const d=new Date().toISOString().split("T")[0];
  S.mm={datum:d,fase:faseId,faseNaam:f.naam,testen:{},criteria:{}};
  S.fase=f;S.crit={};S.toonVlaggen=false;S.sc="meetmoment";render();
}

function openMm(idx){
  const m=S.patData.meetmomenten[idx];
  S.mm=m;S.fase=FASEN.find(f=>f.id===m.fase);S.crit=m.criteria||{};S.toonVlaggen=false;S.sc="meetmoment";render();
}

function openRap(idx){S.rapMm=S.patData.meetmomenten[idx];S.sc="rapport";render();}
function setCrit(c,v){S.crit[c]=v;render();}
function toonOk(){S.ok=true;render();setTimeout(function(){S.ok=false;render();},2000);}

async function persisteerMM(testId,waarden){
  const nm={...S.mm};if(!nm.testen)nm.testen={};
  nm.testen[testId]={waarden,notitie:waarden._notitie||""};
  const nd={...S.patData};nd.been=S.been;
  const idx=nd.meetmomenten.findIndex(x=>x.datum===nm.datum&&x.fase===nm.fase);
  if(idx>=0)nd.meetmomenten[idx]=nm;else nd.meetmomenten.push(nm);
  S.mm=nm;S.patData=nd;
  await saveData(S.patNr,nd);
}

async function saveCrit(){
  const nm={...S.mm,criteria:S.crit};
  const nd={...S.patData};
  const idx=nd.meetmomenten.findIndex(x=>x.datum===nm.datum&&x.fase===nm.fase);
  if(idx>=0)nd.meetmomenten[idx]=nm;else nd.meetmomenten.push(nm);
  S.mm=nm;S.patData=nd;
  await saveData(S.patNr,nd);
  toonOk();
}

function startTest(id){
  const t=TESTEN.find(x=>x.id===id);
  if(t.isGALN){S.galnW=S.mm?.testen?.galn?.waarden||{};S.test=t;S.sc="galn";render();return;}
  if(t.isHHD){S.waarden=S.mm?.testen?.hhd?.waarden||{};S.test=t;S.hhdStap=0;S.sc="hhd";render();return;}
  S.waarden=S.mm?.testen?.[id]?.waarden||{};S.test=t;S.stap=0;S.sc="test";render();
}

async function saveTest(terug){
  const notitie=document.getElementById("test-not")?.value||"";
  S.waarden._notitie=notitie;
  await persisteerMM(S.test.id,S.waarden);
  if(terug){S.sc="meetmoment";render();}else toonOk();
}

async function saveGALN(terug){
  const notitie=document.getElementById("galn-not")?.value||"";
  S.galnW._notitie=notitie;
  await persisteerMM("galn",S.galnW);
  if(terug){S.sc="meetmoment";render();}else toonOk();
}

async function saveHHD(terug){
  await persisteerMM("hhd",S.waarden);
  if(terug){S.sc="meetmoment";render();}else toonOk();
}

render();
</script>
</body>
