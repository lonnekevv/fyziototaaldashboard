async function dbGet(key){
  try{
    const r=await fetch(SB_URL+"/rest/v1/storage?key=eq."+encodeURIComponent(key)+"&select=value",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});

    return d&&d.length>0?d[0].value:null;
  }catch(e){return null;}
}
async function dbSet(key,value){
  try{

}

function addWeeks(dateStr,weeks){
  const d=new Date(dateStr);
  d.setDate(d.getDate()+weeks*7);
  return d.toISOString().split("T")[0];
}
function today(){return new Date().toISOString().split("T")[0];}
function dagenverschil(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24));}
function nlDatum(s){if(!s)return"—";const[y,m,d]=s.split("-");return`${d}-${m}-${y}`;}
function weeksSinceOp(opDatum){return Math.floor(dagenverschil(opDatum,today())/7);}

function getMomentStatus(geplandDatum,gedaan){
  if(gedaan)return"groen";
  const diff=dagenverschil(today(),geplandDatum);
  if(diff<0)return"rood"; // over tijd
  if(diff<=14)return"oranje"; // komende 2 weken
  return"grijs";
}

// ─── HULPFUNCTIES ─────────────────────────────────────────────────
function lsi(a,b){if(!a||!b||Number(b)===0)return"";return((Number(a)/Number(b))*100).toFixed(1);}
function rm1(g,r){if(!g||!r)return"";const rn=Number(r);if(rn<1)return"";return(Number(g)/(1.0278-0.0278*rn)).toFixed(1);}
function calcW(id,w){const n={...w};if(id==="quadriceps_lag"&&n.actieve_extensie!==""&&n.passieve_extensie!=="")n.quad_lag=Math.abs(Number(n.passieve_extensie)-Number(n.actieve_extensie)).toFixed(1);if(id==="beenomtrek")n.been_verschil=lsi(n.been_aangedaan,n.been_niet);if(id==="een_rm"){n.rm_qn_1rm=rm1(n.rm_qn_g,n.rm_qn_r);n.rm_qa_1rm=rm1(n.rm_qa_g,n.rm_qa_r);n.rm_hn_1rm=rm1(n.rm_hn_g,n.rm_hn_r);n.rm_ha_1rm=rm1(n.rm_ha_g,n.rm_ha_r);n.rm_q_lsi=lsi(n.rm_qa_1rm,n.rm_qn_1rm);n.rm_h_lsi=lsi(n.rm_ha_1rm,n.rm_hn_1rm);const ha=Number(n.rm_ha_1rm),qa=Number(n.rm_qa_1rm);if(ha&&qa)n.rm_hq=((ha/qa)*100).toFixed(1);}if(id==="slh")n.slh_lsi=lsi(n.slh_aan,n.slh_niet);if(id==="thd")n.thd_lsi=lsi(n.thd_aan,n.thd_niet);if(id==="sh")n.sh_lsi=lsi(n.sh_aan,n.sh_niet);if(id==="vj")n.vj_lsi=lsi(n.vj_aan,n.vj_niet);return n;}
function calcHHD(w){const n={...w};n.hhd_ham_lsi=lsi(n.hhd_ham_aan,n.hhd_ham_niet);n.hhd_quad_lsi=lsi(n.hhd_quad_aan,n.hhd_quad_niet);const ha=Number(n.hhd_ham_aan),qa=Number(n.hhd_quad_aan);if(ha&&qa)n.hhd_hq=((ha/qa)*100).toFixed(1);return n;}
function lsiKleur(v,type,fase){if(v===""||v===undefined)return null;const n=Number(v),d=LSI_DREMPEL[type]?.[fase];if(d===null)return{bg:C.groenLight,col:C.groen};if(n>=d)return{bg:C.okLight,col:C.ok};if(n>=d-10)return{bg:C.oranjeLight,col:C.oranje};return{bg:C.roodLight,col:C.rood};}
function plankKleur(sec){const n=Number(sec);if(n>=120)return{bg:C.okLight,col:C.ok,label:"Goed (≥120 sec)"};if(n>=60)return{bg:C.oranjeLight,col:C.oranje,label:"Matig (60–119 sec)"};return{bg:C.roodLight,col:C.rood,label:"Onvoldoende (<60 sec)"};}
function tijdNaarSec(str){if(!str)return null;const p=str.split(":");if(p.length===2){const m=parseInt(p[0]),s=parseFloat(p[1]);if(!isNaN(m)&&!isNaN(s))return m*60+s;}return null;}
function roeiKleur(str){const sec=tijdNaarSec(str);if(sec===null)return null;if(sec<150)return{bg:C.okLight,col:C.ok,label:"Goed (<2:30)"};return{bg:C.oranjeLight,col:C.oranje,label:"Ruimte voor verbetering (≥2:30)"};}
function badge(bg,col,tekst){return`<span class="badge" style="background:${bg};color:${col}">${tekst}</span>`;}
function lsiBadge(v,type,fase){const k=lsiKleur(v,type,fase);return k?badge(k.bg,k.col,Number(v).toFixed(1)+"%"):"";}

function renderMeetmoment(){

  const testenHTML=cats.map(cat=>{const rijen=testen.filter(t=>t.cat===cat).map(t=>{const ged=!!mm.testen?.[t.id];const lsiV=t.velden.find(v=>v.ber&&v.lsiType);const lsiVal=ged&&lsiV?mm.testen[t.id]?.waarden?.[lsiV.id]:"";const plankVal=ged&&t.isPlank?mm.testen[t.id]?.waarden?.plank_sec:null;const roeiVal=ged&&t.isRoeien?mm.testen[t.id]?.waarden?.roei_tijd:null;let extra="";if(lsiVal)extra=` ${lsiBadge(lsiVal,lsiV.lsiType,mm.fase)}`;else if(plankVal){const k=plankKleur(plankVal);extra=` ${badge(k.bg,k.col,k.label)}`;}else if(roeiVal){const k=roeiKleur(roeiVal);if(k)extra=` ${badge(k.bg,k.col,roeiVal)}`;}else if(ged)extra=` <span style="font-size:12px;color:${C.ok};font-weight:500">✓</span>`;return`<div class="ft-test-row"><div style="flex:1;margin-right:8px"><span style="font-size:14px;font-weight:500">${t.naam}</span>${extra}</div><button class="ft-btn-sm" onclick="startTest('${t.id}')">${ged?"Bewerken":"Starten"}</button></div>`;}).join("");return`<div style="font-size:13px;font-weight:500;color:${C.groenAccent};text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 6px">${cat}</div><div class="ft-card" style="padding:.25rem 1rem">${rijen}</div>`;}).join("");

function renderPlPatient(){
  const d=S.plPatData;if(!d)return"";
  const opDat=d.operatiedatum;
  const wekenNu=weeksSinceOp(opDat);
  const planning=d.planning||{};

  // Bouw tijdlijn items
  const items=[];

  // Periodieke testen
  PERIODIEK.forEach(p=>{
    const gepland=addWeeks(opDat,p.week);
    const status=planning[p.id];
    const gedaan=status?.gedaan||false;
    const st=getMomentStatus(gepland,gedaan);
    items.push({id:p.id,label:p.label,type:"periodiek",gepland,gedaan,gedaanDatum:status?.gedaanDatum,st,week:p.week});
  });

  // Mijlpalen
  MIJLPALEN.forEach(m=>{
    const status=planning[m.id]||{};
    const gedaan=status.gedaan||false;
    const uitgesteldDatum=status.uitgesteldDatum||null;
    const richtlijn=m.richtlijnWeek?addWeeks(opDat,m.richtlijnWeek):null;
    const gepland=uitgesteldDatum||richtlijn;
    const st=gedaan?"groen":gepland?getMomentStatus(gepland,false):"grijs";
    items.push({id:m.id,label:m.label,type:"mijlpaal",richtlijn,gepland,uitgesteldDatum,gedaan,gedaanDatum:status.gedaanDatum,st,richtlijnWeek:m.richtlijnWeek});
  });

  // RTT reminder
  const rttGedaan=planning["rtt"]?.gedaan;
  const rtcGedaan=planning["rtc"]?.gedaan;
  const rttReminder=rttGedaan&&!rtcGedaan?`
    <div style="background:#fffbeb;border:1.5px solid #f59e0b;border-radius:12px;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:500;color:#92400e;margin-bottom:2px">🏃 RTT testen voltooid</div>
      <div style="font-size:13px;color:#78350f">RTC nog niet gepland — vergeet de 8 trainingen niet te registreren.</div>
    </div>`:"";

  const tijdlijnHTML=items.map(item=>{
    const isUitgesteld=item.uitgesteldDatum;
    const geplandTekst=item.gepland?`${nlDatum(item.gepland)}${item.richtlijnWeek?` (richtlijn: w${item.richtlijnWeek})`:""}`:item.id==="rtc"?"Na 8 trainingen met eigen team":"—";
    const statusTekst=item.gedaan?`✓ Gedaan op ${nlDatum(item.gedaanDatum)}`:item.st==="rood"?"Over tijd":item.st==="oranje"?"Binnenkort":"Gepland";
    const statusKleur=item.gedaan?C.ok:item.st==="rood"?C.rood:item.st==="oranje"?"#92400e":C.muted;

    const uitstellenForm=S.plUitstellenId===item.id?`
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #e0e0da">
        <div style="font-size:13px;color:${C.muted};margin-bottom:6px">Nieuwe datum:</div>
        <input type="date" class="ft-input" style="margin-bottom:8px" id="uitstel-datum" value="${S.plNieuwDatum}" oninput="S.plNieuwDatum=this.value"/>
        <div style="display:flex;gap:8px">
          <button class="ft-btn-p" style="font-size:13px;padding:8px 16px" onclick="slaUitstelOp('${item.id}')">Opslaan</button>
          <button class="ft-btn-sm" onclick="S.plUitstellenId=null;renderPlanning()">Annuleren</button>
        </div>
      </div>`:"";

    const actieBtns=!item.gedaan?`
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
        <button class="ft-btn-sm" style="font-size:12px;padding:5px 12px;background:${C.okLight};border-color:${C.ok};color:${C.ok}" onclick="markeerGedaan('${item.id}')">✓ Gedaan</button>
        ${item.type==="mijlpaal"?`<button class="ft-btn-sm" style="font-size:12px;padding:5px 12px" onclick="S.plUitstellenId='${item.id}';S.plNieuwDatum='';renderPlanning()">Uitstellen</button>`:""}
      </div>${uitstellenForm}`:`
      <div style="margin-top:6px">
        <button class="ft-btn-sm" style="font-size:12px;padding:4px 10px;color:${C.muted}" onclick="markeerOngedaan('${item.id}')">Ongedaan maken</button>
      </div>`;

    return`
      <div class="pl-moment ${item.gedaan?"groen":item.st}" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div>
            <div style="font-size:14px;font-weight:500;color:${C.groen}">${item.label}</div>
            <div style="font-size:12px;color:${C.muted};margin-top:2px">${item.type==="periodiek"?"Periodiek":"Mijlpaal"}${isUitgesteld?" · <span style='color:#92400e'>Uitgesteld</span>":""}</div>
            <div style="font-size:13px;margin-top:4px;color:${C.muted}">${geplandTekst}</div>
          </div>
          <div style="font-size:12px;font-weight:500;color:${statusKleur};text-align:right;flex-shrink:0;padding-top:2px">${statusTekst}</div>
        </div>
        ${actieBtns}
      </div>`;
  }).join("");

  return`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="ft-btn-s" style="padding:7px 14px;font-size:13px" onclick="S.plSc='overzicht';renderPlanning()">← Overzicht</button>
      <div style="flex:1"><div style="font-size:16px;font-weight:500;color:${C.groen}">Patiënt #${S.plPatNr}</div><div style="font-size:13px;color:${C.muted}">${d.been} · w${wekenNu} post-op</div></div>
    </div>
    <div style="background:${C.groen};border-radius:12px;padding:1rem 1.25rem;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;color:${C.mint}">Operatiedatum</div>
        <div style="font-size:17px;font-weight:500;color:#fff">${nlDatum(opDat)}</div>
        <div style="font-size:13px;color:${C.mint};margin-top:2px">Week ${wekenNu} nu · ${d.been} been</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:${C.mint};margin-bottom:4px">Voortgang</div>
        <div style="font-size:22px;font-weight:500;color:#fff">${items.filter(i=>i.gedaan).length}<span style="font-size:14px;opacity:.7">/${items.length}</span></div>
        <div style="font-size:12px;color:${C.mint}">testen gedaan</div>
      </div>
    </div>
    ${rttReminder}
    <div style="font-size:15px;font-weight:500;color:${C.groen};margin-bottom:10px">Testmomenten</div>
    ${tijdlijnHTML}
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid ${C.grijsBorder}">
      <button class="ft-btn-sm" style="color:${C.rood};border-color:${C.roodLight}" onclick="if(confirm('Patiënt #${S.plPatNr} verwijderen uit planning?'))verwijderPat()">Verwijderen uit planning</button>
    </div>`;
}

// ─── PLANNING ACTIES ──────────────────────────────────────────────
async function laadOverzicht(){
  S.plLaden=true;
  renderPlanning();
  const rows=await dbList();
  S.plPatienten=[];
  for(const row of rows){
    try{
      const d=JSON.parse(row.value);
      if(!d.operatiedatum)continue;
      const nr=row.key.replace("vkb_","");
      const wekenNu=weeksSinceOp(d.operatiedatum);
      const planning=d.planning||{};
      // bepaal volgende test en urgentie
      let volgend=null,urgentie="groen";
      const allItems=[];
      PERIODIEK.forEach(p=>{
        const gepland=addWeeks(d.operatiedatum,p.week);
        const gedaan=planning[p.id]?.gedaan||false;
        if(!gedaan)allItems.push({label:p.label,gepland,st:getMomentStatus(gepland,false)});
      });
      MIJLPALEN.forEach(m=>{
        const status=planning[m.id]||{};
        const gedaan=status.gedaan||false;
        const richtlijn=m.richtlijnWeek?addWeeks(d.operatiedatum,m.richtlijnWeek):null;
        const gepland=status.uitgesteldDatum||richtlijn;
        if(!gedaan&&gepland)allItems.push({label:m.label,gepland,st:getMomentStatus(gepland,false)});
      });
      allItems.sort((a,b)=>a.gepland.localeCompare(b.gepland));
      if(allItems.length){
        volgend=allItems[0];
        urgentie=volgend.st;
      }
      S.plPatienten.push({nr,been:d.been,opDatum:d.operatiedatum,wekenGeleden:wekenNu,volgendLabel:volgend?`Volgende: ${volgend.label} (${nlDatum(volgend.gepland)})`:"Alle testen gedaan",urgentie});
    }catch(e){}
  }
  S.plLaden=false;
  renderPlanning();
}

async function voegPatToe(){
  const nr=document.getElementById("pl-nr")?.value.trim();
  const opdat=document.getElementById("pl-opdat")?.value;
  const been=document.getElementById("pl-been")?.value;
  S.plFout="";
  if(!nr){S.plFout="Voer een patiëntnummer in.";renderPlanning();return;}
  if(!opdat){S.plFout="Voer een operatiedatum in.";renderPlanning();return;}
  let d=await loadData(nr)||{meetmomenten:[]};
  d.operatiedatum=opdat;
  d.been=been;
  if(!d.planning)d.planning={};
  await saveData(nr,d);
  await laadOverzicht();
}

async function openPlPatient(nr){
  S.plPatNr=nr;
  S.plPatData=await loadData(nr);
  S.plUitstellenId=null;
  S.plSc="patient";
  renderPlanning();
}

async function markeerGedaan(id){
  if(!S.plPatData.planning)S.plPatData.planning={};
  S.plPatData.planning[id]={gedaan:true,gedaanDatum:today()};
  await saveData(S.plPatNr,S.plPatData);
  S.plUitstellenId=null;
  renderPlanning();
}

async function markeerOngedaan(id){
  if(!S.plPatData.planning)S.plPatData.planning={};
  S.plPatData.planning[id]={gedaan:false};
  await saveData(S.plPatNr,S.plPatData);
  renderPlanning();
}

async function slaUitstelOp(id){
  const nd=S.plNieuwDatum;
  if(!nd){alert("Kies een datum.");return;}
  if(!S.plPatData.planning)S.plPatData.planning={};
  S.plPatData.planning[id]={...S.plPatData.planning[id],gedaan:false,uitgesteldDatum:nd};
  await saveData(S.plPatNr,S.plPatData);
  S.plUitstellenId=null;
  renderPlanning();
}

async function verwijderPat(){
  // Verwijder operatiedatum en planning, behoud testdata
  if(S.plPatData){
    delete S.plPatData.operatiedatum;
    delete S.plPatData.planning;
    await saveData(S.plPatNr,S.plPatData);
  }
  S.plSc="overzicht";
  await laadOverzicht();
}

// ─── TESTEN ACTIES ────────────────────────────────────────────────
function openPat(){
  const nr=document.getElementById("inp-nr")?.value.trim();
  const b=document.getElementById("inp-been")?.value;
  if(!nr){S.fout="Voer een patiëntnummer in.";render();return;}
  S.patNr=nr;S.been=b||"Links";S.fout="";S.laden=true;render();
  loadData(nr).then(function(d){
    S.patData=d||{meetmomenten:[]};
    S.been=d?.been||S.been;
    S.laden=false;S.sc="dashboard";render();
  });
}
function nieuwMm(faseId){
  const f=FASEN.find(x=>x.id===faseId);
  const d=new Date().toISOString().split("T")[0];
  S.mm={datum:d,fase:faseId,faseNaam:f.naam,testen:{},criteria:{}};
  S.fase=f;S.crit={};S.toonVlaggen=false;S.sc="meetmoment";render();
}
function openMm(idx){
  const m=S.patData.meetmomenten[idx];
  S.mm=m;S.fase=FASEN.find(f=>f.id===m.fase);S.crit=m.criteria||{};S.toonVlaggen=false;S.sc="meetmoment";render();
}
function openRap(idx){S.rapMm=S.patData.meetmomenten[idx];S.sc="rapport";render();}
function setCrit(c,v){S.crit[c]=v;render();}
function toonOk(){S.ok=true;render();setTimeout(function(){S.ok=false;render();},2000);}

async function persisteerMM(testId,waarden){
  const nm={...S.mm};if(!nm.testen)nm.testen={};
  nm.testen[testId]={waarden,notitie:waarden._notitie||""};
  const nd={...S.patData};nd.been=S.been;
  const idx=nd.meetmomenten.findIndex(x=>x.datum===nm.datum&&x.fase===nm.fase);
  if(idx>=0)nd.meetmomenten[idx]=nm;else nd.meetmomenten.push(nm);
  S.mm=nm;S.patData=nd;
  await saveData(S.patNr,nd);
}
async function saveCrit(){
  const nm={...S.mm,criteria:S.crit};
  const nd={...S.patData};
  const idx=nd.meetmomenten.findIndex(x=>x.datum===nm.datum&&x.fase===nm.fase);
  if(idx>=0)nd.meetmomenten[idx]=nm;else nd.meetmomenten.push(nm);
  S.mm=nm;S.patData=nd;
  await saveData(S.patNr,nd);
  toonOk();
}
function startTest(id){
  const t=TESTEN.find(x=>x.id===id);
  if(t.isGALN){S.galnW=S.mm?.testen?.galn?.waarden||{};S.test=t;S.sc="galn";render();return;}
  if(t.isHHD){S.waarden=S.mm?.testen?.hhd?.waarden||{};S.test=t;S.hhdStap=0;S.sc="hhd";render();return;}
  S.waarden=S.mm?.testen?.[id]?.waarden||{};S.test=t;S.stap=0;S.sc="test";render();
}
async function saveTest(terug){
  const notitie=document.getElementById("test-not")?.value||"";
  S.waarden._notitie=notitie;
  await persisteerMM(S.test.id,S.waarden);
  if(terug){S.sc="meetmoment";render();}else toonOk();
}
async function saveGALN(terug){
  const notitie=document.getElementById("galn-not")?.value||"";
  S.galnW._notitie=notitie;
  await persisteerMM("galn",S.galnW);
  if(terug){S.sc="meetmoment";render();}else toonOk();
}
async function saveHHD(terug){
  await persisteerMM("hhd",S.waarden);
  if(terug){S.sc="meetmoment";render();}else toonOk();
}

// ─── START ────────────────────────────────────────────────────────
render();
</script>
